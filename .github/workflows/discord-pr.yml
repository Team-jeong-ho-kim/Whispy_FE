name: 📢 Discord PR 알림

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send PR info to Discord
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🔔 새 Pull Request 생성됨!
            🧑‍💻 작성자: ${{ github.actor }}
            📄 제목: ${{ github.event.pull_request.title }}
            🔗 링크: ${{ github.event.pull_request.html_url }}
